version: '3.8'
services:
    web:
        image: mmi3docker/symfony-2024
        container_name: symfony-web-v2
        hostname: symfony-web-v2
        restart: always
        ports:
            - 8320:80
        depends_on:
            - db

        volumes:
            - ./www/:/var/www/
            - ./sites/:/etc/apache2/sites-enabled/

    db:
        image: mariadb:10.8
        container_name: symfony-db-v2
        hostname: symfony-db-v2
        restart: always

        volumes:
            - db-volume:/var/lib/mysql

        environment:
            MYSQL_ROOT_PASSWORD: PASSWORD
            MYSQL_DATABASE: symfony
            MYSQL_USER: symfony
            MYSQL_PASSWORD: PASSWORD

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: symfony-adminsql-v2
        hostname: symfony-adminsql-v2
        restart: always
        ports:
            - 8081:80
        environment:
            PMA_HOST: db
            MYSQL_ROOT_PASSWORD: PASSWORD
            MYSQL_USER: symfony
            MYSQL_PASSWORD: PASSWORD
            MYSQL_DATABASE: symfony    
            
    maildev:
        image: maildev/maildev
        container_name: symfony-mail-v2
        hostname: symfony-mail-v2
        command: bin/maildev --web 1080 --smtp 1025 --hide-extensions STARTTLS
        restart: always
   
        ports:
            - 1081:1080

volumes:
    db-volume: